  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    .header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;height:66px}

    .btn-home:hover{background:var(--sage-d)}
    .btn-tg{display:inline-block;background:var(--sage-d);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;padding:13px 30px;border-radius:999px;text-decoration:none;transition:background .2s}
    .btn-tg:hover{background:var(--navy)}
    footer{background:var(--navy);color:rgba(255,255,255,.5);padding:24px;text-align:center;font-size:.8rem}
    footer a{color:rgba(255,255,255,.4);text-decoration:none}
